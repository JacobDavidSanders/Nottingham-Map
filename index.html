    body {
      margin: 0;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Circular map container */
    #map {
      width: 90vw;
      height: 90vw;
      max-width: 600px;
      max-height: 600px;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(233, 198, 198, 0.8);
    }

    /* Dark overlay outside the circle */
    #map::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.65);
      pointer-events: none;
    }

    .leaflet-container {
      background: #ddd;
    }
  </style>
</head>

/* Add markers */
function addCategory(list, icon) {
  list.forEach(p => {
    L.marker([p.lat, p.lng], { icon })
      .addTo(map)
      .bindPopup(`<b>${p.name}</b>`);
  });
}
