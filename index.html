<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Nottinghamshire Circular Map</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- Mask plugin -->
  <script src="https://unpkg.com/leaflet.maskcanvas"></script>

  <style>
    body {
      background: #f5f5f5;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    /* Circular map container */
    #map {
      width: 90vw;
      height: 90vw;
      max-width: 600px;
      max-height: 600px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.25);
      border: 6px solid white;
      position: relative;
    }

    /* Soft vignette edge */
    #map::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
      box-shadow: inset 0 0 80px rgba(0,0,0,0.45);
    }

    /* Popup styling */
    .custom-popup {
      font-size: 14px;
      line-height: 1.4;
    }

    .custom-popup img {
      width: 100%;
      border-radius: 6px;
      margin-bottom: 8px;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // Nottingham City boundary (simplified GeoJSON)
    const nottinghamCityBoundary = {
      "type": "Feature",
      "geometry": {
        "type": "Polygon",
        "coordinates": [[
          [-1.231, 52.990],
          [-1.230, 52.985],
          [-1.225, 52.980],
          [-1.220, 52.975],
          [-1.210, 52.970],
          [-1.200, 52.965],
          [-1.190, 52.960],
          [-1.180, 52.955],
          [-1.170, 52.950],
          [-1.160, 52.945],
          [-1.150, 52.940],
          [-1.145, 52.935],
          [-1.150, 52.930],
          [-1.160, 52.925],
          [-1.170, 52.920],
          [-1.180, 52.918],
          [-1.190, 52.917],
          [-1.200, 52.918],
          [-1.210, 52.920],
          [-1.220, 52.925],
          [-1.230, 52.930],
          [-1.235, 52.940],
          [-1.238, 52.950],
          [-1.239, 52.960],
          [-1.238, 52.970],
          [-1.235, 52.980],
          [-1.231, 52.990]
        ]]
      }
    };

    // Create the map centered on Nottinghamshire
    const map = L.map("map", {
      zoomControl: false,
      minZoom: 10,
      maxZoom: 18
    }).setView([53.1, -1.0], 10);

    // Nottinghamshire bounding box
    const bounds = L.latLngBounds(
      [53.55, -0.45],  // north-west
      [52.70, -1.75]   // south-east
    );

    // Restrict map movement
    map.setMaxBounds(bounds);

    // Mapbox tiles (PUT YOUR TOKEN BELOW)
    L.tileLayer(
      "https://api.mapbox.com/styles/v1/mapbox/light-v11/tiles/{z}/{x}/{y}?access_token=pk.eyJ1IjoiYnJhbmNvbmluZSIsImEiOiJjbW10bXVidW4xbGI2MnRxdDRpMGN4MGZ0In0.fpixBJ5sOrCvYDpyZAehEw",
      {
        tileSize: 512,
        zoomOffset: -1,
        maxZoom: 18
      }
    ).addTo(map);

    // Dark mask outside Nottinghamshire
    L.mask(bounds, {
      color: "#000",
      opacity: 0.6,
      fillOpacity: 0.6
    }).addTo(map);

    // Draw the Nottingham City boundary line
    L.geoJSON(nottinghamCityBoundary, {
      style: {
        color: "#ff0000",   // red outline
        weight: 3,
        opacity: 0.9
      }
    }).addTo(map);

    // Example pin
    L.marker([52.9548, -1.1581])
      .addTo(map)
      .bindPopup(`
        <div class="custom-popup">
          <img src="https://upload.wikimedia.org/wikipedia/commons/3/3d/Nottingham_Castle.jpg" />
          <strong>Nottingham Castle</strong><br>
          A historic site with amazing views over the city.<br><br>
          <a href="https://www.nottinghamcastle.org.uk" target="_blank">Visit website</a>
        </div>
      `);
  </script>
</body>
</html>
