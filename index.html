<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Nottinghamshire Circular Map</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- Mask plugin -->
  <script src="https://unpkg.com/leaflet.maskcanvas"></script>

  <style>
    body {
      background: #f5f5f5;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    /* Circular map container */
    #map {
      width: 90vw;
      height: 90vw;
      max-width: 600px;
      max-height: 600px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.25);
      border: 6px solid white;
      position: relative;
    }

    /* Soft vignette edge */
    #map::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
      box-shadow: inset 0 0 80px rgba(0,0,0,0.45);
    }

    /* Popup styling */
    .custom-popup {
      font-size: 14px;
      line-height: 1.4;
    }

    .custom-popup img {
      width: 100%;
      border-radius: 6px;
      margin-bottom: 8px;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // Create the map centered on Nottingham
    const map = L.map("map", {
      zoomControl: false,
      minZoom: 10,
      maxZoom: 18
    }).setView([53.1, -1.0], 10);

    // Nottinghamshire bounding box
    const bounds = L.latLngBounds(
      [53.55, -0.45],  // north-west
      [52.70, -1.75]   // south-east
    );

    // Restrict map movement
    map.setMaxBounds(bounds);

    // Mapbox tiles (INSERT YOUR TOKEN BELOW)
    L.tileLayer(
      "https://api.mapbox.com/styles/v1/mapbox/light-v11/tiles/{z}/{x}/{y}?access_token=pk.eyJ1IjoiYnJhbmNvbmluZSIsImEiOiJjbW10bXVidW4xbGI2MnRxdDRpMGN4MGZ0In0.fpixBJ5sOrCvYDpyZAehEw",
      {
        tileSize: 512,
        zoomOffset: -1,
        maxZoom: 18
      }
    ).addTo(map);

    // Dark mask outside Nottinghamshire
    L.mask(bounds, {
      color: "#000",
      opacity: 0.6,
      fillOpacity: 0.6
    }).addTo(map);

    // Example pin
    L.marker([52.9548, -1.1581])
      .addTo(map)
      .bindPopup(`
        <div class="custom-popup">
          <img src="https://upload.wikimedia.org/wikipedia/commons/3/3d/Nottingham_Castle.jpg" />
          <strong>Nottingham Castle</strong><br>
          A historic site with amazing views over the city.<br><br>
          <a href="https://www.nottinghamcastle.org.uk" target="_blank">Visit website</a>
        </div>
      `);
  </script>
</body>
</html>
