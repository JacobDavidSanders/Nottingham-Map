<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Nottingham Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body {
      margin: 0;
      background: white; /* WHITE BACKGROUND */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Circular map container */
    #map {
  width: 500px;
  height: 500px;
  border-radius: 50%;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(233, 198, 198, 0.8); /* WHITE GLOW */
}


    /* Dark overlay outside the circle */
    #map::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.65);
      pointer-events: none;
    }

    .leaflet-container {
      background: #ddd;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const map = L.map("map", {
      zoomControl: false,
      attributionControl: false,
      maxBounds: [
        [53.10, -1.40],
        [52.80, -0.90]
      ]
    }).setView([52.95, -1.15], 12);

    /* LIMIT ZOOM OUT TO ONE SCROLL */
    const minZoom = 11;   // one step below 12
    const maxZoom = 18;   // zoom in as far as Mapbox allows

    map.setMinZoom(minZoom);
    map.setMaxZoom(maxZoom);

    const mapboxToken =
      "pk.eyJ1IjoiYnJhbmNvbmluZSIsImEiOiJjbW10bXVidW4xbGI2MnRxdDRpMGN4MGZ0In0.fpixBJ5sOrCvYDpyZAehEw";

    L.tileLayer(
      `https://api.mapbox.com/styles/v1/mapbox/light-v11/tiles/{z}/{x}/{y}?access_token=${mapboxToken}`,
      {
        tileSize: 512,
        zoomOffset: -1,
        maxZoom: maxZoom
      }
    ).addTo(map);
  </script>
</body>
</html>
